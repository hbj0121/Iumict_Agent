version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: water-postgres
    environment:
      POSTGRES_DB: water_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"  # ← 핵심!
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - water-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  water-network:
    driver: bridge